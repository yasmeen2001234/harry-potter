<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Train Maze</title>

    <!-- Importing a magical Harry Potter style font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Macondo&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --castle-color: #010c19;
        --land-height: 7em;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        /* Magical night sky background gradient */
        background: linear-gradient(to bottom, #020111 0%, #20124d 100%);
        font-family: sans-serif;
      }

      /* ====== NEW BACKGROUND SCENERY ====== */
      .scenery {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        z-index: -1;
        pointer-events: none;
      }

      /* Custom Dragon Canvas Integration */
      #c {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 2; /* Sets it above the castle but below the maze */
        pointer-events: none;
      }

      /* The Moon */
      .moon {
        position: absolute;
        top: 8%;
        right: 12%;
        width: 90px;
        height: 90px;
        background: #fdfcd6;
        border-radius: 50%;
        box-shadow:
          0 0 50px 15px rgba(253, 252, 214, 0.3),
          inset -15px -15px 30px rgba(0, 0, 0, 0.1);
        z-index: 0;
      }

      /* Animated Stars - Shining and Subtle Drifting */
      @keyframes twinkle {
        0% {
          opacity: 0.2;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
        100% {
          opacity: 0.2;
          transform: scale(0.8);
        }
      }

      @keyframes drift {
        0% {
          transform: translate(0px, 0px);
        }
        50% {
          transform: translate(-8px, -4px);
        }
        100% {
          transform: translate(0px, 0px);
        }
      }

      .star-layer {
        position: absolute;
        width: 2px;
        height: 2px;
        background: transparent;
        border-radius: 50%;
        z-index: 0;
      }
      .star-layer.one {
        box-shadow:
          10vw 10vh #fff,
          20vw 35vh #fff,
          45vw 15vh #fff,
          65vw 40vh #fff,
          85vw 10vh #fff,
          90vw 55vh #fff,
          30vw 70vh #fff,
          60vw 80vh #fff,
          5vw 60vh #fff;
        animation:
          twinkle 3s infinite ease-in-out,
          drift 20s infinite ease-in-out;
      }
      .star-layer.two {
        width: 3px;
        height: 3px;
        box-shadow:
          15vw 50vh #f1e4b3,
          40vw 25vh #f1e4b3,
          75vw 60vh #f1e4b3,
          80vw 25vh #f1e4b3,
          25vw 85vh #f1e4b3,
          50vw 85vh #f1e4b3;
        animation:
          twinkle 4s infinite ease-in-out reverse,
          drift 25s infinite ease-in-out reverse;
      }
      .star-layer.three {
        box-shadow:
          25vw 5vh #fff,
          55vw 45vh #fff,
          75vw 85vh #fff,
          95vw 30vh #fff,
          35vw 20vh #fff,
          8vw 20vh #fff;
        animation:
          twinkle 2.5s infinite ease-in-out 1s,
          drift 18s infinite ease-in-out;
      }

      /* ====== USER'S CUSTOM CSS CASTLES ====== */
      .castle-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        font-size: 1.2vw; /* Desktop size */
        pointer-events: none;
        z-index: 1; /* Sets the castle strictly BEHIND the canvas dragons */
        filter: saturate(60%) sepia(30%);
      }

      /* Base wrapper for a single castle acting as a 0px anchor point */
      .castle {
        position: absolute;
        bottom: -2px; /* Hides any tiny pixel gaps at the bottom of the screen */
        width: 0;
        height: 0;
      }

      /* The Land Base */
      .land {
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translate(-50%, 0);
        width: 75em;
        height: var(--land-height);
        background: radial-gradient(
            ellipse at bottom,
            #000d1c 0 20%,
            var(--castle-color) 50% 70%,
            transparent 70% 100%
          )
          50% 0 / 105% 100%;
      }

      /* Elevates the buildings so they sit ON the land */
      .buildings {
        position: absolute;
        left: 0;
        bottom: calc(var(--land-height) * 0.8);
        width: 0;
        height: 0;
      }

      /* Positions for the left and right duplicated castles */
      .left-castle {
        left: 15vw;
      }

      .right-castle {
        right: 15vw;
        /* Flipping the right castle perfectly mirrors the scene! */
        transform: scaleX(-1);
      }

      .b1,
      .b2,
      .b3,
      .b4,
      .b5 {
        position: absolute;
        background: var(--castle-color);
        transform: translate(-50%, 0);
      }

      .roof {
        position: absolute;
        left: 50%;
        transform: translate(-50%, 0);
        background: conic-gradient(
          from 90deg at 50% 0%,
          transparent 0deg 63deg,
          var(--castle-color) 63deg 117deg,
          transparent 117deg
        );
      }

      .door {
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translate(-50%, 0);
        border-radius: 50% 50% 5% 5% / 30% 30% 5% 5%;
        background: radial-gradient(at 50% 100%, #fff0d8 0 70%, #ff2900 70%) 0
          50% / 100% 120%;
      }

      /* Base Window Styles */
      .w1,
      .w2,
      .w3,
      .w4,
      .w5,
      .w6,
      .w1-2,
      .w3-4,
      .w1-2-c {
        position: absolute;
        transform: translate(-50%, 0);
        border-radius: 50% 50% 5% 5% / 30% 30% 5% 5%;
        background:
          linear-gradient(
            transparent 0 35%,
            var(--castle-color) 35% 45%,
            transparent 45%
          ),
          linear-gradient(
            to right,
            transparent 0 45%,
            var(--castle-color) 45% 55%,
            transparent 55%
          ),
          radial-gradient(at 50% 100%, #ffffd7 0 45%, #f8ef9d 60%);
      }

      .w1-2-c {
        border-radius: 50%;
      }

      /* Building 1 */
      .b1 {
        width: 8em;
        height: 15em;
        left: 0;
        bottom: 0;
      }
      .b1 .roof {
        bottom: calc(15em - 0.05em);
        width: 8em;
        height: 8em;
      }
      .b1 .door {
        width: 3em;
        height: 4.5em;
      }
      .b1 .w1,
      .b1 .w2,
      .b1 .w3,
      .b1 .w4,
      .b1 .w5,
      .b1 .w6 {
        width: 1.6em;
        height: 2.4em;
      }
      .b1 .w1,
      .b1 .w3,
      .b1 .w5 {
        left: 2.4em;
      }
      .b1 .w2,
      .b1 .w4,
      .b1 .w6 {
        left: 5.6em;
      }
      .b1 .w1,
      .b1 .w2 {
        bottom: 75%;
      }
      .b1 .w3,
      .b1 .w4 {
        bottom: 47%;
      }
      .b1 .w5,
      .b1 .w6 {
        bottom: 19%;
      }

      /* Building 2 */
      .b2 {
        width: 5em;
        height: 12em;
        left: -6em;
        bottom: 0;
        transform: translate(-50%, 0) rotate(-8deg);
      }
      .b2 .roof {
        bottom: calc(12em - 0.05em);
        width: 5em;
        height: 5em;
      }
      .b2 .w1,
      .b2 .w2,
      .b2 .w3,
      .b2 .w4,
      .b2 .w5,
      .b2 .w6 {
        width: 1em;
        height: 1.5em;
      }
      .b2 .w1,
      .b2 .w3,
      .b2 .w5 {
        left: 1.5em;
      }
      .b2 .w2,
      .b2 .w4,
      .b2 .w6 {
        left: 3.5em;
      }
      .b2 .w1,
      .b2 .w2 {
        bottom: 75%;
      }
      .b2 .w3,
      .b2 .w4 {
        bottom: 47%;
      }
      .b2 .w5,
      .b2 .w6 {
        bottom: 19%;
      }

      /* Building 3 */
      .b3 {
        width: 5em;
        height: 12em;
        left: 6em;
        bottom: 0;
        transform: translate(-50%, 0) rotate(8deg);
      }
      .b3 .roof {
        bottom: calc(12em - 0.05em);
        width: 5em;
        height: 5em;
      }
      .b3 .w3,
      .b3 .w4,
      .b3 .w5,
      .b3 .w6 {
        width: 1em;
        height: 1.5em;
      }
      .b3 .w1-2-c {
        width: 1.7em;
        height: 1.7em;
        left: 50%;
        bottom: calc(75% * 1.1);
      }
      .b3 .w3,
      .b3 .w5 {
        left: 1.5em;
      }
      .b3 .w4,
      .b3 .w6 {
        left: 3.5em;
      }
      .b3 .w3,
      .b3 .w4 {
        bottom: 47%;
      }
      .b3 .w5,
      .b3 .w6 {
        bottom: 19%;
      }

      /* Building 4 */
      .b4 {
        width: 4em;
        height: 8em;
        left: -10em;
        bottom: 0;
        transform: translate(-50%, 0) rotate(-10deg);
      }
      .b4 .roof {
        bottom: calc(8em - 0.05em);
        width: 4em;
        height: 4em;
      }
      .b4 .w1-2,
      .b4 .w3-4 {
        width: 1.2em;
        height: 1.8em;
        left: 50%;
      }
      .b4 .w1-2 {
        bottom: calc(75% * 0.9);
      }
      .b4 .w3-4 {
        bottom: calc(47% * 0.7);
      }

      /* Building 5 */
      .b5 {
        width: 4em;
        height: 8em;
        left: 10em;
        bottom: 0;
        transform: translate(-50%, 0) rotate(10deg);
      }
      .b5 .roof {
        bottom: calc(8em - 0.05em);
        width: 4em;
        height: 4em;
      }
      .b5 .w1,
      .b5 .w2,
      .b5 .w3,
      .b5 .w4 {
        width: 0.8em;
        height: 1.2em;
      }
      .b5 .w1,
      .b5 .w3 {
        left: 1.2em;
      }
      .b5 .w2,
      .b5 .w4 {
        left: 2.8em;
      }
      .b5 .w1,
      .b5 .w2 {
        bottom: 75%;
      }
      .b5 .w3,
      .b5 .w4 {
        bottom: 47%;
      }

      /* ===================================== */

      .maze-container {
        width: 100%;
        max-width: 800px;
        padding: 20px;
        position: relative;
        z-index: 10;
      }

      svg#maze-svg {
        width: 100%;
        height: auto;
        background-color: #eaddc5;
        border-radius: 12px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.5),
          inset 0 0 40px rgba(139, 69, 19, 0.2);
        border: 4px solid #3c2a1a;
      }

      /* Background Blur Effect */
      #maze-content {
        transition:
          filter 1s ease-in-out,
          opacity 1s ease-in-out;
      }

      #maze-content.blurred {
        filter: blur(5px);
        opacity: 0.5;
      }

      /* Owl Visibility & Positioning */
      .owl-positioner {
        opacity: 0;
        pointer-events: none;
        transition: opacity 1s ease-in-out;
      }
      .owl-positioner.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .owl {
        animation: floaty 1.75s infinite;
      }

      .letter-clicker {
        cursor: pointer;
        transition: filter 0.3s ease;
      }
      .letter-clicker:hover {
        filter: drop-shadow(0px 0px 8px #e5b13a);
      }

      /* SVG Animations */
      .Eye1,
      .Eye2 {
        animation: blink 5s infinite;
        transform-origin: 0px;
        transform-box: fill-box;
      }
      .Wing_Left {
        animation: shake-left-wing 500ms infinite;
        transform-origin: 37% 0%;
        transform-box: fill-box;
      }
      .Wing_Right {
        animation: shake-right-wing 500ms infinite;
        transform-origin: 57% 0%;
        transform-box: fill-box;
      }
      .Left_Leg {
        animation: shake-left-leg 1.5s infinite;
        transform-origin: 66% 0%;
        transform-box: fill-box;
      }
      .Right_Leg {
        animation: shake-right-leg 2s infinite;
        transform-origin: 32% 2%;
        transform-box: fill-box;
      }

      .st0 {
        display: none;
      }
      .st1 {
        fill: #482d2c;
        stroke: #6b5f5e;
        stroke-miterlimit: 10;
      }
      .st2 {
        fill: #b8afc2;
      }
      .st3 {
        fill: #ffffff;
      }
      .st4 {
        fill: #482d2c;
      }
      .st5 {
        fill: #b8afc2;
      }
      .st6 {
        display: none;
        fill: #8e8597;
      }
      .st7 {
        fill: #ffffff;
      }
      .st8 {
        stroke: #000000;
        stroke-miterlimit: 10;
      }
      .st9 {
        fill: #ffffff;
        stroke: #000000;
        stroke-miterlimit: 10;
      }
      .st10 {
        fill: #482d2c;
      }

      @keyframes blink {
        40% {
          transform: scaleY(1);
        }
        45% {
          transform: scaleY(0.1);
        }
        50% {
          transform: scaleY(1);
        }
      }
      @keyframes shake-left-wing {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(130deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      @keyframes shake-right-wing {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(-130deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      @keyframes shake-left-leg {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(30deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      @keyframes shake-right-leg {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(-30deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      @keyframes floaty {
        0% {
          transform: translateY(15px);
        }
        50% {
          transform: translateY(0px);
        }
        100% {
          transform: translateY(15px);
        }
      }

      @keyframes float {
        0% {
          transform: translateY(0px) scale(1);
          opacity: 0.85;
        }
        50% {
          transform: translateY(-12px) scale(1.05);
          opacity: 0.6;
        }
        100% {
          transform: translateY(0px) scale(1);
          opacity: 0.85;
        }
      }

      .smoke-puff {
        animation: float 4s ease-in-out infinite;
        transform-origin: center;
      }
      .smoke-puff:nth-child(2) {
        animation-delay: -1.5s;
      }
      .smoke-puff:nth-child(3) {
        animation-delay: -3s;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      #wheel-back {
        transform-origin: 150px 295px;
      }
      #wheel-mid {
        transform-origin: 260px 310px;
      }
      #wheel-front {
        transform-origin: 340px 310px;
      }

      .track-clicker {
        cursor: pointer;
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }

      #moving-train {
        offset-rotate: auto;
        opacity: 0;
        transition: opacity 0.3s;
      }

      /* TRAIN FALLING APART ANIMATIONS */
      @keyframes break-body {
        100% {
          transform: translateY(150px) rotate(35deg);
          opacity: 0;
        }
      }
      @keyframes break-wheel-back {
        100% {
          transform: translate(-150px, 150px) rotate(-360deg);
          opacity: 0;
        }
      }
      @keyframes break-wheel-mid {
        100% {
          transform: translate(50px, 200px) rotate(180deg);
          opacity: 0;
        }
      }
      @keyframes break-wheel-front {
        100% {
          transform: translate(200px, 100px) rotate(360deg);
          opacity: 0;
        }
      }
      @keyframes scatter-smoke {
        100% {
          transform: translate(-150px, -200px) scale(2);
          opacity: 0;
        }
      }

      .falling-apart #train-body {
        animation: break-body 1.2s forwards
          cubic-bezier(0.55, 0.085, 0.68, 0.53);
      }
      .falling-apart #wheel-back {
        animation: break-wheel-back 1.1s forwards
          cubic-bezier(0.55, 0.085, 0.68, 0.53);
      }
      .falling-apart #wheel-mid {
        animation: break-wheel-mid 1.2s forwards
          cubic-bezier(0.55, 0.085, 0.68, 0.53);
      }
      .falling-apart #wheel-front {
        animation: break-wheel-front 1s forwards
          cubic-bezier(0.55, 0.085, 0.68, 0.53);
      }
      .falling-apart #smoke {
        animation: scatter-smoke 1s forwards ease-out;
      }

      /* Error/Crash Overlay */
      #message-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.95);
        padding: 2rem 3rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        text-align: center;
        opacity: 1;
        transition: opacity 0.3s ease;
        pointer-events: auto;
        z-index: 10;
        border: 2px solid #3c2a1a;
        cursor: pointer;
      }
      #message-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #message-overlay h2 {
        margin: 0 0 0.5rem 0;
        font-size: 1.6rem;
        color: #1a1a1a;
      }

      /* Magical Opened Letter Overlay - UPDATED TO BE SQUARE */
      #letter-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.6) rotate(-5deg);
        background: #f4e8c1;
        background-image: radial-gradient(#f4e8c1 40%, #e8d5a5 100%);

        /* Forces the letter to be a square and scalable */
        width: clamp(300px, 80vw, 550px);
        aspect-ratio: 1;
        box-sizing: border-box;
        padding: clamp(1.5rem, 4vw, 3rem);

        display: flex;
        flex-direction: column;
        justify-content: center;

        border-radius: 4px;
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.5),
          inset 0 0 25px rgba(166, 138, 86, 0.5);
        opacity: 0;
        pointer-events: none;
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 20;
        border: 2px solid #d4b872;
      }
      #letter-overlay.open {
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }

      .letter-content {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .letter-logo {
        position: absolute;
        top: -15px;
        right: -15px;
        width: 90px;
        height: auto;
        opacity: 0.9;
        filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.2));
      }

      .hp-font {
        font-family: "Macondo", cursive, serif;
        color: #2b5329;
        margin: 0;
        letter-spacing: 1px;
      }
      .letter-greeting {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        text-align: left;
        margin-right: 70px;
      }
      .letter-body {
        font-size: 1.6rem;
        line-height: 1.4;
        text-align: justify;
        margin-bottom: 1rem;
      }
      .letter-signoff {
        font-size: 1.8rem;
        text-align: right;
        margin-top: 1rem;
        margin-bottom: 1.5rem;
        line-height: 1.3;
      }

      #close-letter-btn {
        padding: 12px 28px;
        background: #9e2a3b;
        color: #f4e8c1;
        border: 2px solid #7a1a29;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1.1rem;
        transition: background 0.2s;
        font-family: sans-serif;
        display: block;
        margin: 0 auto;
        margin-top: auto; /* Pushes button to bottom if space is available */
      }
      #close-letter-btn:hover {
        background: #7a1a29;
      }

      /* ====== MOBILE OVERRIDES ====== */
      @media (max-width: 768px) {
        .castle-container {
          font-size: 0.5vw;
        }

        /* Scale down letter fonts so they fit perfectly in the square on mobile */
        .letter-greeting {
          font-size: 1.8rem;
          margin-right: 50px;
          margin-bottom: 0.8rem;
        }
        .letter-body {
          font-size: 1.1rem;
          margin-bottom: 0.8rem;
        }
        .letter-signoff {
          font-size: 1.3rem;
          margin-top: 0.5rem;
          margin-bottom: 1rem;
        }
        .letter-logo {
          width: 60px;
          top: -10px;
          right: -10px;
        }
        #close-letter-btn {
          font-size: 1rem;
          padding: 10px 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- FIXED BACKGROUND SCENE -->
    <div class="scenery">
      <!-- Your Custom Dragon Canvas -->
      <canvas id="c"></canvas>

      <div class="moon"></div>
      <div class="star-layer one"></div>
      <div class="star-layer two"></div>
      <div class="star-layer three"></div>

      <!-- Your Custom CSS Castle implementation -->
      <div class="castle-container">
        <!-- Left Castle -->
        <div class="castle left-castle">
          <div class="land"></div>
          <div class="buildings">
            <div class="b1">
              <div class="roof"></div>
              <div class="door"></div>
              <div class="w1"></div>
              <div class="w2"></div>
              <div class="w3"></div>
              <div class="w4"></div>
              <div class="w5"></div>

    <!-- External Dragon Canvas Script added here -->
    <script src="dragon.js"></script>

    <script>
      const mazeContent = document.getElementById("maze-content");
      const train = document.getElementById("moving-train");
      const trainVisuals = document.getElementById("train-visuals");
      const clickers = document.querySelectorAll(".track-clicker");
      const wheels = document.querySelectorAll(".wheel");

      const messageOverlay = document.getElementById("message-overlay");

      const owlPositioner = document.querySelector(".owl-positioner");
      const letterOverlay = document.getElementById("letter-overlay");
      const closeLetterBtn = document.getElementById("close-letter-btn");
      const hogwartsLetter = document.getElementById("hogwarts-letter");

      let currentAnimation = null;

      // Interaction for closing the generic error message
      messageOverlay.addEventListener("click", () => {
        messageOverlay.classList.add("hidden");
        trainVisuals.classList.remove("falling-apart");
        train.style.opacity = "0"; // Reset the train visually for a new game
      });

      // Interaction for opening the magical letter
      hogwartsLetter.addEventListener("click", () => {
        letterOverlay.classList.add("open");
      });

      // Interaction for closing the magical letter
      closeLetterBtn.addEventListener("click", () => {
        letterOverlay.classList.remove("open");
        owlPositioner.classList.remove("visible");
        mazeContent.classList.remove("blurred");
        train.style.opacity = "0"; // Reset the train visually for a new game
      });

      clickers.forEach((clicker) => {
        clicker.addEventListener("click", function () {
          // Hide previous messages and reset effects
          messageOverlay.classList.add("hidden");
          letterOverlay.classList.remove("open");
          owlPositioner.classList.remove("visible");
          mazeContent.classList.remove("blurred");
          trainVisuals.classList.remove("falling-apart");

          const targetId = this.getAttribute("data-target");
          const pathElement = document.querySelector(targetId);
          const pathData = pathElement.getAttribute("d");

          if (currentAnimation) {
            currentAnimation.cancel();
          }

          train.style.offsetPath = `path('${pathData}')`;
          train.style.opacity = "1";

          wheels.forEach((wheel) => {
            wheel.style.animation = "spin 1.5s linear infinite";
          });

          currentAnimation = train.animate(
            [{ offsetDistance: "0%" }, { offsetDistance: "100%" }],
            {
              duration: 5000,
              easing: "linear",
              fill: "forwards",
            },
          );

          currentAnimation.onfinish = () => {
            // FIX: Clear the inline spin style so the crash CSS animation takes over
            wheels.forEach((wheel) => {
              wheel.style.animation = "";
            });

            // Trigger Win/Loss Conditions
            if (targetId === "#path2") {
              // Gryffindor Path Selected - Show the Owl and blur background!
              owlPositioner.classList.add("visible");
              mazeContent.classList.add("blurred");
            } else {
              // Incorrect Path - Train parts break apart and Show Error Message
              trainVisuals.classList.add("falling-apart");

              // Delay the overlay slightly so user sees the crash first
              setTimeout(() => {
                messageOverlay.classList.remove("hidden");
              }, 700);
            }
          };
        });
      });
    </script>
